packages:
  - .

# Protection supply-chain : n'installe que des versions publiées depuis ≥ 7 jours
minimumReleaseAge: 10080
minimumReleaseAgeIgnoreMissingTime: true
minimumReleaseAgeStrict: false
resolutionMode: highest

allowBuilds:
  "@parcel/watcher": true
  better-sqlite3: true
  esbuild: true
  vue-demi: true
